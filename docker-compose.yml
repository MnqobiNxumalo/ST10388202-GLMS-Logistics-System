version: '3.8'

services:
  sql-server-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: glms-sql-server
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrong!Password123"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - glms-network

  glms-backend-api:
    build:
      context: .
      dockerfile: GLMS.API/Dockerfile
    container_name: glms-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Server=sql-server-db;Database=GLMS_DB;User Id=sa;Password=YourStrong!Password123;TrustServerCertificate=True;Encrypt=False
    depends_on:
      - sql-server-db
    ports:
      - "8080:80"
    networks:
      - glms-network

  glms-frontend-web:
    build:
      context: .
      dockerfile: GLMS.Web/Dockerfile
    container_name: glms-web
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ApiBaseAddress=http://glms-backend-api
    depends_on:
      - glms-backend-api
    ports:
      - "8081:80"
    networks:
      - glms-network

networks:
  glms-network:
    driver: bridge

volumes:
  sqlserver-data: